<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#172025" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="description" content="Alpine Legacy — карьерная roguelike-RPG про альпинизм." />
    <meta name="application-name" content="Alpine Legacy" />
    <meta name="apple-mobile-web-app-title" content="Alpine Legacy" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <script>
      (() => {
        const root = document.documentElement;
        const width = Math.round(window.visualViewport?.width || window.innerWidth || root.clientWidth);
        const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        const coarse = window.matchMedia('(pointer: coarse)').matches;
        root.dataset.device = width <= 820 || (standalone && coarse && width <= 1024) ? 'phone' : 'desktop';
        try {
          const saved = JSON.parse(localStorage.getItem('alpine-legacy:ui-settings:v1') || '{}');
          const theme = saved.theme === 'dark' || saved.theme === 'light'
            ? saved.theme
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
        } catch {}
      })();
    </script>

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./favicon.ico" sizes="any" />
    <link rel="icon" href="./icons/icon-32.png" type="image/png" sizes="32x32" />
    <link rel="icon" href="./icons/icon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180" />

    <title>Alpine Legacy</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
